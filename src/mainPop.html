<!doctype html>
<html lang="en">
  <head>
    <title>Test Extension</title>
    <!-- The maximum dimensions of the window is 800 x 600 pixels-->
    <style>
      body {
        background-color: #3f3f3f;
      }
      #allCont {
        display: flex;
        background-color: blueviolet;
      }
      #mainPgCont,
      #storagePgCont,
      #keyPgCont,
      #faqPgCont {
        background-color: #3f3f3f;
        width: 600px;
        height: 500px;
        margin: 5px;
      }
      #keyPgCont {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #storagePgCont {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #navBarCont {
        background-color: #c1bfbf;
        width: 100px;
        height: 500px;
        margin: 5px;
        display: block;
      }

      #keyGenOutput {
        width: 300px;
        height: auto;
      }
      small {
        width: 300px;
        height: auto;
      }
      #inputContainer {
        background-color: chocolate;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        padding: 10px;
      }
      #leftIn {
        background-color: red;
        width: 244px;
        height: 208px;
        margin: 5px;
        border-style: solid;
        border-width: 1px;
        border-radius: 7px;
      }
      #Lcont {
        background-color: brown;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #rightOut {
        background-color: blue;
        width: 244px;
        height: 208px;
        margin: 5px;
        border-style: solid;
        border-width: 1px;
        border-radius: 7px;
      }
      #Rcont {
        background-color: aqua;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #inData,
      #outData,
      #enDeKeyInput {
        resize: none;
        background: rgba(255, 179, 0, 0.311);
        border-width: 0px;
        border-radius: 7px;
        font-size: x-small;
      }
      #inData::placeholder,
      #outData::placeholder,
      #enDeKeyInput::placeholder {
        color: black;
      }
      /*This hides the scrollbar from the text areas*/
      #inData::-webkit-scrollbar,
      #outData::-webkit-scrollbar,
      #enDeKeyInput::-webkit-scrollbar,
      #keyArea::-webkit-scrollbar {
        display: none;
      }

      #Bcont {
        background-color: dodgerblue;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 10px;
        padding: 10px;
      }

      #mainButtonArea {
        background-color: hotpink;
        display: flex;
        width: 400px;
        justify-content: space-evenly;

        margin: 10px;
        padding: 10px;
      }

      #keyAreaCont,
      #pkTableCont {
        flex: 1;
        overflow-y: auto;
      }
      #keyArea,
      #pkArea {
        display: flex;
        margin: 10px;
        align-items: center;
        flex-direction: column;
      }

      #storageTable,
      #pkTable {
        background-color: #f1ccba;
        border-radius: 5px;
        table-layout: auto;
        width: 95%;
        padding: 10px;
      }
      #storageTable th,
      #pkTable th {
        border-bottom: 2px solid #000;
      }
      #storageTable td,
      #pkTable td {
        /*border-right: 1px solid #000;*/
        border-bottom: 0.3px dashed #000;
      }
      #KGbuttonArea,
      #pkInCont {
        background-color: #c1bfbf;
        display: block;
        padding: 10px;
        margin: 10px;
        position: sticky;
        bottom: 0;
        border-radius: 10px;
      }
      #pkTxtIn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        margin-bottom: 10px;
      }
      #pkIn {
        resize: none;
      }
      #KGBr1,
      #PKSr1 {
        /*background-color: chartreuse;*/
        display: flex;
        justify-content: space-evenly;
        padding: 5px;
      }
      #KGBr2 {
        /*background-color: blue;*/
        display: flex;
        justify-content: space-evenly;
        padding: 5px;
        padding-top: 10px;
      }
      #copyPubKGBtn,
      #deleteKGBtn,
      #copyPrivKGBtn,
      #genKeysBtn,
      #resetNumsBtn,
      #pkInBtn,
      #pkDelBtn,
      #pkCopyBtn {
        color: white;
        border-radius: 4px;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
        border: none;
        padding: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      #copyPubKGBtn,
      #copyPrivKGBtn,
      #pkInBtn {
        background-color: rgb(30, 182, 65);
      }
      #deleteKGBtn,
      #resetNumsBtn,
      #pkDelBtn {
        background-color: rgb(193, 60, 60);
      }
      #genKeysBtn,
      #pkCopyBtn {
        background-color: rgb(65, 185, 221);
      }

      #mainBtn,
      #storBtn,
      #keyBtn,
      #faqBtn {
        background-color: #3f3f3f;
        color: #fff;
        margin-top: 10px;
        margin-bottom: 10px;
        padding: 5px;
        text-align: center;
        width: 100px;
        height: 50px;
        border: none;

        overflow-y: auto;
      }
      .navBttn:hover {
        opacity: 0.75;
      }
      .navBttn:focus {
        background-color: grey;
      }

      .encBtn {
        display: block;
      }

      .selected {
        background-color: #98bffd;
        cursor: pointer;
      }
      tr:hover {
        opacity: 0.7;
        cursor: pointer;
      }
      p {
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div id="allCont">
      <div id="mainPgCont">
        <!-- <h1>Hello User</h1> -->

        <div id="inputContainer">
          <div id="Lcont">
            <p>Input Data</p>
            <div id="leftIn">
              <textarea
                id="inData"
                rows="18"
                cols="40"
                placeholder="Input Data Here..."
              ></textarea>
            </div>
          </div>

          <div id="Rcont">
            <p>Output Data</p>
            <div id="rightOut">
              <textarea
                id="outData"
                rows="18"
                cols="40"
                placeholder="Ouput Text Will Be Shown Here..."
              ></textarea>
            </div>
          </div>
        </div>

        <div id="Bcont">
          <div id="bInputArea">
            <textarea
              id="enDeKeyInput"
              rows="5"
              cols="80"
              placeholder="Paste Key To Be Used Here..."
            ></textarea>
          </div>
          <div id="mainButtonArea">
            <button type="button" id="encBtn">Encrypt</button>
            <button type="button" id="cpyClip">Copy Output</button>
            <button type="button" id="decBtn">Decrypt</button>
          </div>
        </div>

        <!-- <button type="button" id="ranNumBtn">Random Num</button>
        <p id="ranNumOut">Click for random num to be saved</p> -->
      </div>

      <!-- -------------------- KEY STORAGE PAGE -------------------- -->
      <div id="storagePgCont">
        <p>STORAGE PAGE</p>
        <div id="pkTableCont">
          <div id="pkArea">
            <table id="pkTable"></table>
          </div>
        </div>
        <div id="pkInCont">
          <div id="pkInArea">
            <div id="pkTxtIn">
              <input id="refIn" type="text" placeholder="Key Reference Here" />
              <textarea
                id="pkIn"
                rows="5"
                cols="75"
                placeholder="Paste Public Keys Here..."
              ></textarea>
            </div>
            <div id="PKSr1">
              <button type="button" id="pkInBtn">Save New Key</button>
              <button type="button" id="pkCopyBtn">
                Copy <b>PUBLIC</b> Key
              </button>
              <button type="button" id="pkDelBtn">Delete Row</button>
            </div>
          </div>
        </div>
      </div>

      <!-- -------------------- KEY GENERATION PAGE -------------------- -->
      <div id="keyPgCont">
        <p>KEY GENERATION PAGE</p>
        <p>These are YOUR keys</p>
        <div id="keyAreaCont">
          <div id="keyArea">
            <table id="storageTable"></table>
          </div>
        </div>

        <div id="KGbuttonArea">
          <div id="KGBr1">
            <button type="button" id="copyPubKGBtn">
              Copy <b>PUBLIC</b> Key
            </button>
            <button type="button" id="deleteKGBtn">Delete Key Pair</button>
            <button type="button" id="copyPrivKGBtn">
              Copy <b>PRIVATE</b> Key
            </button>
          </div>

          <div id="KGBr2">
            <button type="button" id="genKeysBtn">Generate Key</button>
            <button type="button" id="resetNumsBtn">Reset Storage</button>
          </div>
        </div>
      </div>

      <!-- -------------------- FAQ PAGE -------------------- -->
      <div id="faqPgCont">
        <p>FAQ PAGE</p>

        <button type="button" id="dataWipeBtn">WIPE ALL DATA</button>
      </div>

      <div id="navBarCont">
        <button type="button" id="mainBtn">Main Page</button>
        <button type="button" id="storBtn">Storage Page</button>
        <button type="button" id="keyBtn">Make Key Pair</button>
        <button type="button" id="faqBtn">FAQ Page</button>
      </div>
    </div>

    <!-- External JS-->
    <script type="module" src="../build/dist/popup.bundle.js"></script>
  </body>
</html>
